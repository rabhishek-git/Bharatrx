<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bharat-Rx</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        user-select: none;
        font-family: 'Cormorant Garamond', serif;
      }

      .container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
      }

      .glow {
        position: absolute;
        width: 16rem;
        height: 16rem;
        background: rgba(220, 38, 38, 0.15);
        border-radius: 50%;
        filter: blur(65px);
        pointer-events: none;
        animation: heartbeat-glow 1.1s ease-in-out infinite;
      }

      .heart-wrap {
        animation: heartbeat 1.1s ease-in-out infinite;
        filter: drop-shadow(0 0 35px rgba(239, 68, 68, 0.45));
      }

      .heart-wrap svg {
        width: 12rem;
        height: 12rem;
      }

      .text-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        animation: fadeup 0.8s ease-out 0.2s both;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 300;
        letter-spacing: 0.12em;
        color: rgba(255,255,255,0.95);
        text-align: center;
        text-shadow: 0 0 15px rgba(255,255,255,0.1);
      }

      h1 span {
        font-weight: 600;
        color: #ef4444;
      }

      p {
        font-size: clamp(0.65rem, 1.5vw, 0.8rem);
        font-weight: 300;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(107, 114, 128, 0.8);
        text-align: center;
        animation: fadeup 1.0s ease-out 0.5s both;
      }

      @keyframes heartbeat {
        0%   { transform: scale(1); }
        15%  { transform: scale(1.25); }
        28%  { transform: scale(1.1); }
        45%  { transform: scale(1.4); }
        100% { transform: scale(1); }
      }

      @keyframes heartbeat-glow {
        0%   { transform: scale(1);    opacity: 0.15; }
        15%  { transform: scale(1.25); opacity: 0.45; }
        28%  { transform: scale(1.1);  opacity: 0.25; }
        45%  { transform: scale(1.4);  opacity: 0.55; }
        100% { transform: scale(1);    opacity: 0.15; }
      }

      @keyframes fadeup {
        from { opacity: 0; transform: translateY(15px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="glow"></div>
      <div class="heart-wrap">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="heart-gradient" cx="30%" cy="30%" r="70%">
              <stop offset="0%" stop-color="#fca5a5" />
              <stop offset="35%" stop-color="#ef4444" />
              <stop offset="100%" stop-color="#7f1d1d" />
            </radialGradient>
          </defs>
          <path fill="url(#heart-gradient)"
            d="M 50 15 C 35 -5, 0 0, 0 35 C 0 65, 35 80, 50 95 C 65 80, 100 65, 100 35 C 100 0, 65 -5, 50 15 Z" />
        </svg>
      </div>
      <div class="text-block">
        <h1>BHARAT-<span>Rx</span></h1>
        <p>Coming Soon</p>
      </div>
    </div>
  </body>
</html>
